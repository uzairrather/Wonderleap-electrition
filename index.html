<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Unity Web Player | WonderLeap Electrician</title>
    <link rel="shortcut icon" href="TemplateData/favicon.ico">
    <link rel="stylesheet" href="TemplateData/style.css">
    <style>
      * { margin: 0; padding: 0; }
      html, body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #1a1a2e;
      }
      #unity-container {
        width: 100%;
        height: 100%;
        position: absolute;
        top: 0;
        left: 0;
      }
      #unity-canvas {
        width: 100%;
        height: 100%;
        display: block;
      }
      /* Landscape prompt for mobile portrait */
      #rotate-prompt {
        display: none;
        position: fixed;
        top: 0; left: 0; right: 0; bottom: 0;
        background: #1a1a2e;
        color: white;
        z-index: 9999;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        font-family: Arial, sans-serif;
      }
      #rotate-prompt .icon {
        font-size: 80px;
        margin-bottom: 20px;
        animation: rotatePhone 2s ease-in-out infinite;
      }
      #rotate-prompt h2 {
        font-size: 22px;
        margin-bottom: 10px;
      }
      #rotate-prompt p {
        font-size: 14px;
        opacity: 0.7;
      }
      @keyframes rotatePhone {
        0%, 100% { transform: rotate(0deg); }
        50% { transform: rotate(90deg); }
      }
      /* Show rotate prompt only on mobile portrait */
      @media screen and (max-width: 768px) and (orientation: portrait) {
        #rotate-prompt { display: flex; }
        #unity-container { display: none; }
      }
      @media screen and (max-width: 768px) and (orientation: landscape) {
        #rotate-prompt { display: none; }
        #unity-container { display: block; }
      }
    </style>
  </head>
  <body>
    <!-- Rotate prompt for mobile portrait -->
    <div id="rotate-prompt">
      <div class="icon">📱</div>
      <h2>Rotate Your Device</h2>
      <p>This game works best in landscape mode.<br>Please turn your phone sideways to play.</p>
    </div>

    <div id="unity-container">
      <canvas id="unity-canvas" tabindex="-1"></canvas>
      <div id="unity-loading-bar">
        <div id="unity-logo"></div>
        <div id="unity-progress-bar-empty">
          <div id="unity-progress-bar-full"></div>
        </div>
      </div>
      <div id="unity-warning"> </div>
      <!-- Footer hidden -->
      <div id="unity-footer" style="display: none;">
        <div id="unity-logo-title-footer"></div>
        <div id="unity-fullscreen-button"></div>
        <div id="unity-build-title">WonderLeap Electrician</div>
      </div>
    </div>
    <script>
      var canvas = document.querySelector("#unity-canvas");

      function unityShowBanner(msg, type) {
        var warningBanner = document.querySelector("#unity-warning");
        function updateBannerVisibility() {
          warningBanner.style.display = warningBanner.children.length ? 'block' : 'none';
        }
        var div = document.createElement('div');
        div.innerHTML = msg;
        warningBanner.appendChild(div);
        if (type == 'error') div.style = 'background: red; padding: 10px;';
        else {
          if (type == 'warning') div.style = 'background: yellow; padding: 10px;';
          setTimeout(function() {
            warningBanner.removeChild(div);
            updateBannerVisibility();
          }, 5000);
        }
        updateBannerVisibility();
      }

      var buildUrl = "Build";
      var loaderUrl = buildUrl + "/build-2.loader.js";
      var config = {
        arguments: [],
        dataUrl: buildUrl + "/build-2.data",
        frameworkUrl: buildUrl + "/build-2.framework.js",
        codeUrl: buildUrl + "/build-2.wasm",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "Wonder Leap",
        productName: "WonderLeap Electrician",
        productVersion: "0.5",
        showBanner: unityShowBanner,
      };

      if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
        var meta = document.createElement('meta');
        meta.name = 'viewport';
        meta.content = 'width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes';
        document.getElementsByTagName('head')[0].appendChild(meta);
        document.querySelector("#unity-container").className = "unity-mobile";
        canvas.className = "unity-mobile";
      }

      // Canvas always fills container — no hardcoded size
      canvas.style.width = "100%";
      canvas.style.height = "100%";

      document.querySelector("#unity-loading-bar").style.display = "block";

      var script = document.createElement("script");
      script.src = loaderUrl;
      script.onload = () => {
        createUnityInstance(canvas, config, (progress) => {
          document.querySelector("#unity-progress-bar-full").style.width = 100 * progress + "%";
        }).then((unityInstance) => {
          document.querySelector("#unity-loading-bar").style.display = "none";
          document.querySelector("#unity-fullscreen-button").onclick = () => {
            unityInstance.SetFullscreen(1);
          };
        }).catch((message) => {
          alert(message);
        });
      };

      document.body.appendChild(script);
    </script>
  </body>
</html>
